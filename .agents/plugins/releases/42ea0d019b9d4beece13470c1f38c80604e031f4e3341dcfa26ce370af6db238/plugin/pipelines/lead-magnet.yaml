id: lead-magnet
domain: marketing
title: Lead Magnet
match: [lead magnet, content upgrade, opt-in, gated content, ebook]
phases:
  - { id: intake,           role: brainstorm,    desc: "ICP, pain, promise, format (checklist/ebook/template), conversion goal" }
  - { id: research,         role: docs-research, desc: "audience evidence, competitor magnets, proof points" }
  - { id: hook-and-promise, role: author,        desc: "headline via PAS or BAB: name pain, agitate, promise transformation; validate vs ICP" }
  - { id: outline,          role: author,        desc: "value outline: quick win + depth; lead-capture placement" }
  - { id: draft,            role: author,        desc: "draft the asset; actionable, skimmable, on-brand" }
  - { id: design-brief,     role: author,        desc: "layout/design brief + CTA + landing-page copy" }
  - { id: conversion-copy,  role: author,        desc: "landing page headline (AIDA), opt-in micro-copy, thank-you upsell CTA; spam-trigger check on follow-up email" }
  - { id: review,           role: code-review,   desc: "adversarial review gate" }
  - { id: score,            role: score,         desc: "score vs rubric, apply floor principle" }
  - { id: humanize, role: humanize,     desc: "final pass: strip AI tells (em-dashes, banned words, robotic cadence) for human delivery" }
optional_phases:
  - { id: publish, role: author, desc: "OPTIONAL, skippable — terminal publish-prep phase after humanize: assemble the packet (final artifact + image prompts + metadata, merged bottom-up into one manifest), run a visual-verify pass (screenshot + console evidence), then STOP at the action fence — publish actions require the human's explicit go-ahead." }
gate:
  criteria: [audience-fit, value, actionability, headline-clarity, conversion-copy, design-readiness]
  floor: 2
  pass_total: 14
