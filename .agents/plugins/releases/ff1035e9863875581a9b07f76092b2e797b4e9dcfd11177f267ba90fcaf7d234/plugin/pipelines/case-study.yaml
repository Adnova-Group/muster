id: case-study
domain: sales
title: Customer Case Study
match: [case study, customer story, success story, testimonial]
phases:
  - { id: intake,             role: brainstorm,    desc: "customer, segment, the win, target buyer" }
  - { id: synthesis,          role: docs-research, desc: "interview/notes synthesis; for ingested source documents, build a section-map before searching, then extract every quote, metric, fact, decision, and action into one structured evidence table — the ledger's case-study form — before drafting: row types {quote, metric, fact, decision|action}, columns {value, source-anchor (file+locator, landing in ## Sources as `- anchor: file+locator`), confidence, needs_review, subject-approval-status}, plus owner + deadline as columns applicable only to decision|action rows (unowned actions and undated deadlines are flagged, not silently dropped); draft and downstream phases read this table only, replacing freeform quote/metric/fact collection" }
  - { id: draft,              role: author,        desc: "Hero's Journey (customer=hero, product=guide); Challenge->Solution->Results (CSR); 600-1200 words; headline leads with a concrete metric" }
  - { id: metrics,            role: author,        desc: "verify + foreground the metrics; pull-quotes; reads only rows from the synthesis-phase evidence table — 100% of cited metrics traceable to a row" }
  - { id: buyer-fit,          role: author,        desc: "reframe results for target buyer segment; next-step CTA + related social proof; confirm ICP match" }
  - { id: review,             role: code-review,   desc: "adversarial review + credibility check" }
  - { id: approval-checklist, role: author,        desc: "customer-approval checklist: quotes approved, metrics cleared, logo/name usage, legal flag" }
  - { id: score,              role: score,         desc: "score vs rubric, apply floor principle" }
  - { id: humanize, role: humanize,     desc: "final pass: strip AI tells (em-dashes, banned words, robotic cadence) for human delivery" }
gate:
  criteria: [hero-arc, metrics, credibility, clarity, buyer-alignment, cta]
  floor: 2
  pass_total: 15
