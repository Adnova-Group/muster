name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm test
      - name: Verify packed tarball
        run: |
          TARBALL=$(npm pack --json | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8');console.log(JSON.parse(d)[0].filename)")
          TMPDIR=$(mktemp -d)
          cd "$TMPDIR"
          npm init -y
          npm install "$OLDPWD/$TARBALL"
          ./node_modules/.bin/muster detect
          ./node_modules/.bin/muster doctor
