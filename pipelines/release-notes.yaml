id: release-notes
domain: pm
title: Release Notes
match: [release notes, changelog]
phases:
  - { id: intake,     role: brainstorm,  desc: "release scope, audience (users vs devs)" }
  - { id: changes,    role: docs-research, desc: "gather merged changes / highlights / fixes" }
  - { id: draft,      role: author,      desc: "draft: highlights first, grouped, user-impact framed" }
  - { id: review,     role: code-review, desc: "adversarial review gate" }
  - { id: score,      role: score,       desc: "score vs rubric, floor principle" }
gate:
  criteria: [clarity, completeness, user-impact, tone, structure]
  floor: 2
  pass_total: 12
