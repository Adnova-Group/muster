sources:
  - id: superpowers
    kind: github
    repo: obra/superpowers
    # pinned SHA — resolve a new one deliberately when updating, and review the regenerated diff before committing
    # (was kind:local, tracking whatever superpowers plugin version was already
    # installed; pinned here for reproducible vendoring, matching wshobson's shape).
    # ref = obra/superpowers Superpowers 6 release (2026-06-16), commit 8e1262a
    # "writing-plans: task right-sizing, Global Constraints header, per-task
    # Interfaces blocks" — rolled into sp-plan/SKILL.md (muster-local frontmatter
    # + intro paragraphs preserved):
    #   1. Task Right-Sizing guidance (tasks sized to one reviewable slice).
    #   2. Global Constraints header (plan-level constraints stated once,
    #      inherited by every task).
    #   3. Per-task Interfaces blocks (each task declares interfaces it
    #      exposes/consumes).
    #
    # Re-pinned 2026-07-06: 8e1262a -> 284be590 (v6.0.0 tag commit), so the pin
    # covers all three sp-subagents mechanisms rolled into sp-subagents/SKILL.md
    # below (muster-local frontmatter + intro paragraphs preserved):
    #   1. Pre-flight plan-conflict review (b61b550) — batch conflicts into one
    #      question before Task 1 dispatch instead of interrupting mid-plan.
    #   2. Tiered implementer dispatch (cfe48c28ac) — cheapest tier when the
    #      plan already carries complete code; mid-tier floor for prose-only
    #      task text.
    #   3. Reviewer risk-budget (de4672b171) — constraints as the reviewer's
    #      attention lens; named risks get one focused check, not an open
    #      sweep.
    # 284be590 pulls in 11 commits past 8e1262a, not just these three; the 9
    # skills/ paths below still resolve at 284be590 (verified). Spot-diffed
    # upstream against the vendored copies (2026-07-06): writing-plans is
    # byte-identical; subagent-driven-development gained upstream text beyond
    # the three rolled mechanisms (a narration line, a final-review
    # model-choice note, a Red Flags plan-mandated-finding clause) that this
    # roll does not adapt — left un-rolled, reported to the orchestrator
    # rather than edited into the (hand-adapted, not mechanically synced)
    # vendored SKILL.md.
    ref: 284be5905ed540d34ce5bcde24728b9b7f413ea0
    license: MIT
    items:
      - from: skills/brainstorming/SKILL.md
        id: sp-brainstorm
        roles: [brainstorm]
      - from: skills/writing-plans/SKILL.md
        id: sp-plan
        roles: [plan]
      - from: skills/test-driven-development/SKILL.md
        id: sp-tdd
        roles: [test-author]
      - from: skills/requesting-code-review/SKILL.md
        id: sp-review
        roles: [code-review]
      - from: skills/receiving-code-review/SKILL.md
        id: sp-review-recv
        roles: [code-review]
        rank: 48
      - from: skills/systematic-debugging/SKILL.md
        id: sp-debug
        roles: [debug]
      - from: skills/verification-before-completion/SKILL.md
        id: sp-verify
        roles: [test-author]
      - from: skills/subagent-driven-development/SKILL.md
        id: sp-subagents
        roles: [plan]
      - from: skills/dispatching-parallel-agents/SKILL.md
        id: sp-parallel
        roles: [plan]
