  - id: gsd
    kind: github
    repo: open-gsd/gsd-core
    # pinned SHA — resolve a new one deliberately when updating, and review the regenerated diff before committing
    # Re-pinned 2026-07-06. Rolled mechanisms (hand-adapted into the muster builtins below,
    # not a mechanical vendor diff — each upstream file's actual workflow differs from
    # muster's, so the mechanism was ported into muster's existing voice/structure):
    #   - honest-verifier abstain (insufficient_spec, never guess pass/fail) -> gsd-verify-work
    #     (upstream gsd-core@1899538, #1154)
    #   - plan:pre codebase-drift pre-check (warn-only, before planner spawns) -> gsd-plan-phase
    #     (upstream gsd-core@d1f7ba8, #1592)
    #   - must-NOT probe ("Must NOT Change" section -> must_haves.prohibitions) -> gsd-plan-phase
    #     (upstream gsd-core@395fb51, #644)
    #   - context_guard_mode (self-monitored context-budget checkpoint/handoff at wave
    #     boundaries) -> gsd-execute-phase (upstream gsd-core@4eca5ac, #1452)
    ref: 18995380ce8d85bccd8a3c64973664348b29cab8
    license: MIT
    items:
      - from: gsd-core/workflows/plan-phase.md
        id: gsd-plan-phase
        roles: [plan]
      - from: gsd-core/workflows/execute-phase.md
        id: gsd-execute-phase
        roles: [implement]
      - from: gsd-core/workflows/verify-work.md
        id: gsd-verify-work
        roles: [plan]
        description: "Built-in for verify — UAT + gap-closure verification of completed work"
